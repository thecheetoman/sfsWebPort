<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://cdn.jsdelivr.net/gh/thecheetoman/sfsWebPort/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Spaceflight Simulator</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* Cover the entire screen with the loading overlay */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #222222;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      z-index: 999;
      transition: opacity 0.5s ease;
    }
    #loading-title {
      font-size: 24px;
      margin-bottom: 20px;
    }
    #loading-bar-track {
      width: 300px;
      height: 10px;
      background: #444444;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: #ffffff;
      transition: width 0.2s ease;
    }
    #loading-mb {
      font-size: 14px;
      color: #aaaaaa;
    }
  </style>
</head>

<body style="text-align: center; padding: 0; border: 0; margin: 0;">
  <div id="loading-overlay">
    <div id="loading-title">SFS Web Port</div>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
    <div id="loading-mb">Initializing…</div>
  </div>
  <canvas id="unity-canvas" width=960 height=600 tabindex="-1"
    style="width: 100%; height: 100%; background: #CCCCCC"></canvas>
  <script>
    let totalDownloaded = 0;
    // Rough estimate of total combined size for part files to calculate percentage progress
    const estimatedTotalSize = 150 * 1024 * 1024; 
    const _nativeFetch = window.fetch.bind(window);

    window.fetch = async function (input, init) {
      const response = await _nativeFetch(input, init);
      const url = typeof input === 'string' ? input : input.url;

      if (/\.(data|wasm|js)(\.part\d+)?(\.gz|\.br)?(\?|$)/i.test(url)) {
        const cloned = response.clone();
        const reader = cloned.body.getReader();
        (async () => {
          try {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              totalDownloaded += value.byteLength;
              updateLoadingProgress();
            }
          } catch (_) { }
        })();
      }
      return response;
    };

    function updateLoadingProgress() {
      const mb = (totalDownloaded / (1024 * 1024)).toFixed(1);
      document.getElementById('loading-mb').textContent = mb + ' MB downloaded';
      
      // Update visual loading bar percentage
      const percentage = Math.min((totalDownloaded / estimatedTotalSize) * 200, 100);
      document.getElementById('loading-bar-fill').style.width = percentage + '%';
    }
  </script>
  <script src="Build/sfsPort.loader.js"></script>
  <script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.position = "fixed";

      document.body.style.textAlign = "left";
    }

    function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
        let buffers = [];
        function fetchPart(index) {
          if (index >= fileParts.length) {
            resolve(URL.createObjectURL(new Blob(buffers)));
            return;
          }
          fetch(fileParts[index])
            .then(r => r.arrayBuffer())
            .then(data => { buffers.push(data); fetchPart(index + 1); })
            .catch(reject);
        }
        fetchPart(0);
      });
    }

    function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
      return parts;
    }

    (async () => {
      try {
        const dataParts = getParts("Build/sfsPort.data", 1, 2);
        const codeParts = getParts("Build/sfsPort.wasm", 1, 2);

        const [mergedDataUrl, mergedCodeUrl] = await Promise.all([
          mergeFiles(dataParts),
          mergeFiles(codeParts)
        ]);

        createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: mergedDataUrl,
          frameworkUrl: "Build/sfsPort.framework.js",
          codeUrl: mergedCodeUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Stef Morojna",
          productName: "Spaceflight Simulator",
          productVersion: "1.5.9.8",
          devicePixelRatio: 2,
        }).then((unityInstance) => {
          // Hide and fade out the loading overlay when initialization completes
          const loader = document.getElementById('loading-overlay');
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        });
      } catch (error) {
        console.error("An error occurred:", error);
        document.getElementById('loading-mb').textContent = "Error loading game.";
      }
    })();
  </script>
</body>

</html>
